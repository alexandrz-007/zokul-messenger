name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zokul
          POSTGRES_PASSWORD: zokul
          POSTGRES_DB: zokul
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npx jest --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://zokul:zokul@localhost:5432/zokul
          JWT_SECRET: test-secret
          VAPID_PUBLIC_KEY: your-vapid-public-key
          VAPID_PRIVATE_KEY: your-vapid-private-key

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit
