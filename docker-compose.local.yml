services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zokul
      POSTGRES_PASSWORD: zokul
      POSTGRES_DB: zokul
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zokul']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      PORT: '3001'
      NODE_ENV: production
      DATABASE_URL: postgresql://zokul:zokul@postgres:5432/zokul
      JWT_SECRET: local-dev-secret
      CORS_ORIGIN: http://localhost
      REDIS_URL: redis://redis:6379
      VAPID_PUBLIC_KEY: your-vapid-public-key
      VAPID_PRIVATE_KEY: your-vapid-private-key
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/api/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '80:80'
    volumes:
      - ./client/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
