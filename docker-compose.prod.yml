services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zokul
      POSTGRES_PASSWORD: zokul
      POSTGRES_DB: zokul
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zokul']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      PORT: '3001'
      NODE_ENV: production
      DATABASE_URL: postgresql://zokul:zokul@postgres:5432/zokul
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://zokul.zhichkin.space
      REDIS_URL: redis://redis:6379
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '80:80'
      - '443:443'
      - '8080:8080'
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
